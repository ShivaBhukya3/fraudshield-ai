services:
  - type: web
    name: fraudshield-ai
    runtime: python
    buildCommand: "pip install -r requirements.txt && python -c \"from ml.train import train_model; import os; os.path.exists('ml/fraud_model.pkl') or train_model()\""
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fraudshield-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: fraudshield-db
    databaseName: fraudshield
    user: fraudshield
    plan: free
